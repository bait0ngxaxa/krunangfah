services:
    db:
        container_name: krunangfah-db
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_INITDB_ARGS: "-E UTF8"
            TZ: Asia/Bangkok
        # PostgreSQL tuning (stable baseline)
        command:
            - "postgres"
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=1536MB"
            - "-c"
            - "work_mem=8MB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "max_connections=50"
            - "-c"
            - "wal_buffers=16MB"
            - "-c"
            - "random_page_cost=1.1"
        volumes:
            - postgres_krunangfah_data:/var/lib/postgresql/data
        ports:
            - "127.0.0.1:5434:5432"
        networks:
            - backend
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-krunangfah}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped
        shm_size: "256m"
        security_opt:
            - no-new-privileges:true
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    pgbouncer:
        container_name: krunangfah-pgbouncer
        image: edoburu/pgbouncer:v1.25.1-p0
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: ${POSTGRES_USER}
            DB_PASSWORD: ${POSTGRES_PASSWORD}
            DB_NAME: ${POSTGRES_DB}
            AUTH_TYPE: scram-sha-256
            POOL_MODE: transaction
            MAX_CLIENT_CONN: 100
            DEFAULT_POOL_SIZE: 20
            RESERVE_POOL_SIZE: 5
            MAX_PREPARED_STATEMENTS: 100
            QUERY_WAIT_TIMEOUT: 30
        ports:
            - "127.0.0.1:6432:5432"
        networks:
            - backend
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-krunangfah}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    redis:
        container_name: krunangfah-redis
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis_krunangfah_data:/data
        ports:
            - "127.0.0.1:6379:6379"
        networks:
            - backend
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

networks:
    backend:
        driver: bridge

volumes:
    postgres_krunangfah_data:
        driver: local
    redis_krunangfah_data:
        driver: local
