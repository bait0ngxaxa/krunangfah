# Nginx reverse proxy for the Krunangfah Next.js app behind Cloudflare.
# Replace server_name and certificate paths if the production domain differs.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream krunangfah_nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name knf.baitongtestdeploy.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name knf.baitongtestdeploy.online;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    ssl_certificate /etc/ssl/cloudflare/knf.baitongtestdeploy.online.pem;
    ssl_certificate_key /etc/ssl/cloudflare/knf.baitongtestdeploy.online.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # The app accepts image/form uploads; keep this above Next serverActions 15MB.
    client_max_body_size 25m;

    access_log /var/log/nginx/krunangfah.access.log;
    error_log /var/log/nginx/krunangfah.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    location /_next/static/ {
        proxy_pass http://krunangfah_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://krunangfah_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
